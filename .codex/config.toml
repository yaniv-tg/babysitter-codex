# =============================================================================
# Babysitter-Codex Integration Configuration
# Version: 1.0.1
# Description: Configures the Codex CLI for babysitter orchestration,
#              including permissions, hooks, and run directory settings.
# =============================================================================

# NOTE: The babysitter SDK is a CLI tool, not an MCP server.
# Orchestration is driven via shell hooks and the `babysitter` CLI binary,
# not through an MCP server connection. The hooks below invoke the CLI
# commands (run:iterate, task:post, etc.) directly.

# Sandbox configuration
# Controls what the Codex agent process is allowed to read and write on disk.
# Keeping permissions as narrow as possible reduces the blast radius of mistakes.
[sandbox]
permissions = [
  "disk-full-read-access",       # Agent may read any file in the repo (needed to analyse code)
  "disk-write-access-.a5c",      # Agent may only write inside .a5c/ (run state, logs, task outputs)
]

# =============================================================================
# Plugin System Configuration
# =============================================================================

# Plugin manifest — registers all skills, commands, and hooks
[plugin]
manifest = ".codex/plugin.json"

# Hook scripts — drive the babysitter orchestration loop
[hooks]
session_start = ".codex/hooks/babysitter-session-start.sh"
stop = ".codex/hooks/babysitter-stop-hook.sh"
